name: htmldom tests
on:
  push:
    paths:
      - 'htmldom/**'
      - '.github/workflows/htmldom-tests.yml'
  pull_request:
    paths:
      - 'htmldom/**'
      - '.github/workflows/htmldom-tests.yml'
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run test harness
        run: node htmldom/htmldom.test.js
